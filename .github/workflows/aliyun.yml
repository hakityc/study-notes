name: Build and Deploy on my server

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ vars.BUILD_DIR }}

  deploy:
    name: Deploy
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: /tmp/build-artifact-study

      - name: Deploy to server
        run: |
          rsync -a --delete /tmp/build-artifact-study/ ${{ vars.DEPLOY_PATH }}/
          echo "✅ Deployed successfully"

